<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI</title>
    <!-- styles-->
    <link rel="stylesheet" href="styles.css">
    <!-- fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- icons-->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="profile-card">
        <div class="profile-img">
            <img src="Profile img.jfif" alt="Adebayo Israel" class="profile-img">
        </div>

        <div class="text-data">
            <span class="Name">Adebayo Israel</span>
            <span class="About">Web Developer</span>
        </div>

        <div class="media-buttons">
            <a href="https://www.facebook.com/Stix4ril/" target="_blank" style="background:#0165E1 ;" class="link">
                <i class='bx bxl-facebook'></i>
            </a>
            <a href="https://x.com/kaptain_szn" target="_blank" style="background:#1DA1F2 ;" class="link">
                <i class='bx bxl-twitter'></i>
            </a>
            <a href="https://www.instagram.com/kaptain_nsc/" target="_blank" style="background:#E1306C ;" class="link">
                <i class='bx bxl-instagram'></i>
            </a>
            <a href="https://ng.linkedin.com/in/adebayo-israel-082a11314" target="_blank" style="background:#0077B5 ;"
                class="link">
                <i class='bx bxl-linkedin'></i>
            </a>
        </div>
        <div class="buttons">
            <a href="https://x.com/kaptain_szn" target="_blank" class="button-link">
                <button class="btn">Follow</button>
            </a>
            <a href="https://ng.linkedin.com/in/adebayo-israel-082a11314" target="_blank" class="button-link">
                <button class="btn">Message</button>
            </a>

        </div>
    </div>
</body>

</html>
